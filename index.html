<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panambí Dulce - Tienda Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', 'Segoe UI', sans-serif;
            background-color: #FFFFFF;
            color: #1A1A1A;
        }

        header {
            border-bottom: 1px solid #E8E8E8;
            padding: 2rem 2%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .logo-gold {
            color: #D4AF37;
        }

        .cart-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -8px;
            background-color: #D4AF37;
            color: #FFFFFF;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            padding: 4rem 2%;
            text-align: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.1rem;
            color: #888780;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .products-section {
            padding: 0 2%;
            max-width: 1400px;
            margin: 0 auto 4rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
        }

        .product-card {
            border: 1px solid #E8E8E8;
            padding: 2rem 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: #D4AF37;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.1);
        }

        .product-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .product-description {
            color: #888780;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            min-height: 2.5rem;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 600;
            color: #D4AF37;
        }

        .add-btn {
            background: #1A1A1A;
            color: #FFFFFF;
            border: none;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .add-btn:hover {
            background: #D4AF37;
        }

        footer {
            border-top: 1px solid #E8E8E8;
            padding: 2rem 2%;
            text-align: center;
            color: #888780;
            font-size: 0.9rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid #E8E8E8;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .cart-empty {
            color: #888780;
            text-align: center;
            padding-top: 2rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid #E8E8E8;
            margin-bottom: 1rem;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: #888780;
            font-size: 0.9rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qty-btn {
            background: #F5F5F0;
            border: none;
            cursor: pointer;
            padding: 0.4rem;
            font-size: 14px;
        }

        .qty-display {
            width: 30px;
            text-align: center;
        }

        .remove-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #888780;
            padding: 0.4rem;
        }

        .modal-footer {
            border-top: 1px solid #E8E8E8;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .total-price {
            color: #D4AF37;
        }

        .checkout-btn {
            background-color: #1A1A1A;
            color: #FFFFFF;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }

        .checkout-btn:hover {
            background-color: #D4AF37;
        }

        .checkout-btn:disabled {
            background-color: #DDD;
            cursor: not-allowed;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        input {
            padding: 0.8rem;
            border: 1px solid #E8E8E8;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #D4AF37;
        }

        .success-message {
            text-align: center;
            padding-top: 2rem;
        }

        .success-circle {
            width: 60px;
            height: 60px;
            background-color: #D4AF37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
        }

        .success-message h3 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .success-message p {
            color: #888780;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .modal-content {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo">
            <span class="logo-gold">◆</span> Panambí Dulce
        </div>
        <button class="cart-button" onclick="toggleCart()">
            🛒
            <span class="cart-count" id="cartCount" style="display: none;">0</span>
        </button>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h1>Pastelería Artesanal</h1>
        <p>Donde la sofisticación encuentra cada bocado</p>
    </section>

    <!-- PRODUCTOS -->
    <section class="products-section">
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>Madrid | Entregas en 24-48h</p>
        <p style="margin-top: 0.5rem;">Encargos: info@panambi-dulce.com</p>
    </footer>

    <!-- CARRITO MODAL -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu carrito</h2>
                <button class="close-btn" onclick="toggleCart()">✕</button>
            </div>
            <div class="modal-body" id="cartBody"></div>
            <div class="modal-footer">
                <div class="total-row">
                    <span>Total:</span>
                    <span class="total-price" id="totalPrice">0€</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn" onclick="handleCheckout()">Proceder al pago</button>
            </div>
        </div>
    </div>

    <script>
        // PRODUCTOS - EDITABLE
        const products = [
            { id: 1, name: 'Tarta de Queso', price: 25, image: '🧀', description: 'Cremosa, elegante, irresistible' },
            { id: 2, name: 'Tarta de Pistacho', price: 28, image: '🥜', description: 'Sabores sofisticados en cada bocado' },
            { id: 3, name: 'Baklava Artesanal', price: 18, image: '🍯', description: 'Capas de perfección' },
            { id: 4, name: 'Cookies Premium', price: 12, image: '🍪', description: 'Pequeño lujo para cada momento' },
            { id: 5, name: 'Tarta Personalizada (2kg)', price: 45, image: '🎂', description: 'Tu diseño, nuestra dedicación' },
            { id: 6, name: 'Brownie de Chocolate', price: 15, image: '🍫', description: 'Intensidad sin compromiso' },
            { id: 7, name: 'Cheesecake de Frutos Rojos', price: 32, image: '🫐', description: 'Frescor y cremosidad juntos' },
            { id: 8, name: 'Tarta de Matcha', price: 30, image: '🍵', description: 'Elegancia asiática, sabor refinado' },
            { id: 9, name: 'Lemon Pie Artesanal', price: 22, image: '🍋', description: 'Cítrico, fresco y sofisticado' }
        ];

        let cart = [];

        // Renderizar productos
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-emoji">${product.image}</div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-description">${product.description}</div>
                    <div class="product-footer">
                        <span class="product-price">${product.price}€</span>
                        <button class="add-btn" onclick="addToCart(${product.id})">Añadir</button>
                    </div>
                </div>
            `).join('');
        }

        // Añadir al carrito
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCart();
        }

        // Actualizar cantidad
        function updateQuantity(productId, newQuantity) {
            if (newQuantity <= 0) {
                removeFromCart(productId);
            } else {
                const item = cart.find(item => item.id === productId);
                if (item) item.quantity = newQuantity;
                updateCart();
            }
        }

        // Eliminar del carrito
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // Actualizar vista del carrito
        function updateCart() {
            const cartBody = document.getElementById('cartBody');
            const cartCount = document.getElementById('cartCount');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            if (cart.length === 0) {
                cartBody.innerHTML = '<p class="cart-empty">Tu carrito está vacío</p>';
                cartCount.style.display = 'none';
                document.getElementById('checkoutBtn').disabled = true;
            } else {
                cartCount.textContent = totalItems;
                cartCount.style.display = 'flex';
                document.getElementById('checkoutBtn').disabled = false;
                
                cartBody.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price}€ x ${item.quantity}</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">−</button>
                            <span class="qty-display">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">✕</button>
                        </div>
                    </div>
                `).join('');
            }

            document.getElementById('totalPrice').textContent = totalPrice.toFixed(2) + '€';
        }

        // Toggle carrito
        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('active');
        }

        // Checkout (simulado)
        function handleCheckout() {
            if (cart.length === 0) return;
            
            alert('Gracias por tu compra! 🎉\n\nTotal: ' + cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toFixed(2) + '€\n\nEn breve te contactaremos para confirmar los detalles.');
            cart = [];
            updateCart();
            toggleCart();
        }

        // Inicializar
        renderProducts();
        updateCart();
    </script>
</body>
</html>

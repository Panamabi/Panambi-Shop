<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panambí Dulce - Tienda Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', 'Segoe UI', sans-serif;
            background-color: #FFFFFF;
            color: #1A1A1A;
        }

        header {
            background-color: #606043;
            padding: 1.5rem 2%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-img {
            height: 50px;
            object-fit: contain;
        }

        .cart-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 28px;
            position: relative;
            color: #FFFFFF;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background-color: #D4AF37;
            color: #1A1A1A;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            padding: 4rem 2%;
            text-align: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.1rem;
            color: #888780;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .products-section {
            padding: 0 2%;
            max-width: 1400px;
            margin: 0 auto 4rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            border: 1px solid #E8E8E8;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            border-color: #606043;
            box-shadow: 0 4px 20px rgba(96, 96, 67, 0.15);
        }

        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: #F5F5F0;
        }

        .product-content {
            padding: 1.8rem;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: #1A1A1A;
        }

        .product-description {
            color: #888780;
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }

        .product-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #E8E8E8;
        }

        .spec {
            display: flex;
            flex-direction: column;
        }

        .spec-label {
            font-size: 0.8rem;
            color: #888780;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .spec-value {
            font-size: 1rem;
            color: #1A1A1A;
            font-weight: 500;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .product-price {
            font-size: 1.6rem;
            font-weight: 700;
            color: #606043;
        }

        .add-btn {
            background: #1A1A1A;
            color: #FFFFFF;
            border: none;
            padding: 0.9rem 1.4rem;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            flex: 1;
        }

        .add-btn:hover {
            background: #606043;
        }

        footer {
            border-top: 1px solid #E8E8E8;
            padding: 2rem 2%;
            text-align: center;
            color: #888780;
            font-size: 0.9rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .modal-header {
            background-color: #606043;
            color: #FFFFFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 500;
        }

        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #FFFFFF;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .cart-empty {
            color: #888780;
            text-align: center;
            padding-top: 2rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid #E8E8E8;
            margin-bottom: 1rem;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: #888780;
            font-size: 0.9rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qty-btn {
            background: #F5F5F0;
            border: 1px solid #E8E8E8;
            cursor: pointer;
            padding: 0.4rem;
            font-size: 14px;
            font-weight: bold;
        }

        .qty-display {
            width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #888780;
            padding: 0.4rem;
            font-size: 16px;
        }

        .modal-footer {
            border-top: 1px solid #E8E8E8;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .total-price {
            color: #606043;
        }

        .checkout-btn {
            background-color: #606043;
            color: #FFFFFF;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .checkout-btn:hover:not(:disabled) {
            background-color: #505035;
        }

        .checkout-btn:disabled {
            background-color: #DDD;
            cursor: not-allowed;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        input, textarea {
            padding: 0.8rem;
            border: 1px solid #E8E8E8;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #606043;
            box-shadow: 0 0 0 2px rgba(96, 96, 67, 0.1);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .modal-content {
                max-width: 100%;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/Panamabi/Panambi-Shop/231c379a4d4c5eb2138af52f30b5465c53c4e7a3/imagenes/Panamb%C3%AD%201.png" alt="Panambí Dulce" class="logo-img">
        </div>
        <button class="cart-button" onclick="toggleCart()">
            🛒
            <span class="cart-count" id="cartCount" style="display: none;">0</span>
        </button>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h1>Pastelería Artesanal</h1>
        <p>Donde la sofisticación encuentra cada bocado</p>
    </section>

    <!-- PRODUCTOS -->
    <section class="products-section">
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>Madrid | Entregas en 24-48h</p>
        <p style="margin-top: 0.5rem;">Encargos: info@panambi-dulce.com</p>
    </footer>

    <!-- CARRITO MODAL -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu carrito</h2>
                <button class="close-btn" onclick="toggleCart()">✕</button>
            </div>
            <div class="modal-body" id="cartBody"></div>
            <div class="modal-footer">
                <div class="total-row">
                    <span>Total:</span>
                    <span class="total-price" id="totalPrice">0€</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn" onclick="handleCheckout()">Proceder al pago</button>
            </div>
        </div>
    </div>

    <script>
        // PRODUCTOS - EDITABLE FÁCILMENTE
        // Cambio: Ahora cada producto tiene: nombre, precio, imagen, descripción, tamaño, personas, peso
        const products = [
            {
                id: 1,
                name: 'Tarta de Queso Clásica',
                price: 25,
                image: 'https://raw.githubusercontent.com/Panamabi/Panambi-Shop/819f4b228aec84315e8c4ad2b1b5dd594744e6fb/imagenes/Tarta%20queso%20clasica%201.JPG',
                description: 'Tarta de queso con base de galleta y vainilla (opción sin gluten)',
                tamanio: '20cm',
                personas: '10-12',
                peso: '1,6kg'
            },
            {
                id: 2,
                name: 'Tarta de Queso y Avellana',
                price: 25,
                image: 'https://raw.githubusercontent.com/Panamabi/Panambi-Shop/819f4b228aec84315e8c4ad2b1b5dd594744e6fb/imagenes/Tarta%20queso%20avellana%201.JPG',
                description: 'Tarta de queso y avellanas con base de galleta (opción sin gluten)',
                tamanio: '20cm',
                personas: '10-12',
                peso: '1,6kg'
            },
            {
                id: 3,
                name: 'Tarta de Queso y Pistacho',
                price: 28,
                image: 'https://raw.githubusercontent.com/Panamabi/Panambi-Shop/819f4b228aec84315e8c4ad2b1b5dd594744e6fb/imagenes/Tarta%20queso%20pistacho%201.PNG',
                description: 'Tarta de queso y pistachos con base de galleta (opción sin gluten)',
                tamanio: '20cm',
                personas: '10-12',
                peso: '1,6kg'
            },
            {
                id: 4,
                name: 'Tarta Personalizada',
                price: 45,
                image: 'https://raw.githubusercontent.com/Panamabi/Panambi-Shop/819f4b228aec84315e8c4ad2b1b5dd594744e6fb/imagenes/Tarta%20personalizada%202.JPG',
                description: 'Tu diseño, tu sabor. Personaliza tu tarta según tus deseos',
                tamanio: 'Personalizado',
                personas: 'A consultar',
                peso: 'A consultar'
            },
            {
                id: 5,
                name: 'Tarta Marquesa',
                price: 32,
                image: 'https://raw.githubusercontent.com/Panamabi/Panambi-Shop/819f4b228aec84315e8c4ad2b1b5dd594744e6fb/imagenes/Tarta%20marquesa%201.PNG',
                description: 'Elegancia en chocolate. Capas de sofisticación y sabor',
                tamanio: '20cm',
                personas: '10',
                peso: '1,3kg'
            },
            {
                id: 6,
                name: 'Baklava Artesanal',
                price: 32,
                image: 'https://raw.githubusercontent.com/Panamabi/Panambi-Shop/819f4b228aec84315e8c4ad2b1b5dd594744e6fb/imagenes/Baklava%201.JPG',
                description: 'Capas crujientes de masa filo con frutos secos y miel',
                tamanio: 'Individual',
                personas: '10-12',
                peso: '1,6kg'
            }
        ];

        let cart = [];

        // Renderizar productos
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-content">
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-specs">
                            <div class="spec">
                                <span class="spec-label">Tamaño</span>
                                <span class="spec-value">${product.tamanio}</span>
                            </div>
                            <div class="spec">
                                <span class="spec-label">Personas</span>
                                <span class="spec-value">${product.personas}</span>
                            </div>
                            <div class="spec">
                                <span class="spec-label">Peso</span>
                                <span class="spec-value">${product.peso}</span>
                            </div>
                        </div>
                        <div class="product-footer">
                            <span class="product-price">${product.price}€</span>
                            <button class="add-btn" onclick="addToCart(${product.id})">Añadir</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Añadir al carrito
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCart();
        }

        // Actualizar cantidad
        function updateQuantity(productId, newQuantity) {
            if (newQuantity <= 0) {
                removeFromCart(productId);
            } else {
                const item = cart.find(item => item.id === productId);
                if (item) item.quantity = newQuantity;
                updateCart();
            }
        }

        // Eliminar del carrito
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // Actualizar vista del carrito
        function updateCart() {
            const cartBody = document.getElementById('cartBody');
            const cartCount = document.getElementById('cartCount');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            if (cart.length === 0) {
                cartBody.innerHTML = '<p class="cart-empty">Tu carrito está vacío</p>';
                cartCount.style.display = 'none';
                document.getElementById('checkoutBtn').disabled = true;
            } else {
                cartCount.textContent = totalItems;
                cartCount.style.display = 'flex';
                document.getElementById('checkoutBtn').disabled = false;
                
                cartBody.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price}€ x ${item.quantity}</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">−</button>
                            <span class="qty-display">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">✕</button>
                        </div>
                    </div>
                `).join('');
            }

            document.getElementById('totalPrice').textContent = totalPrice.toFixed(2) + '€';
        }

        // Toggle carrito
        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('active');
        }

        // Checkout (simulado)
        function handleCheckout() {
            if (cart.length === 0) return;
            
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toFixed(2);
            alert('¡Gracias por tu compra! 🎉\n\nTotal: ' + totalPrice + '€\n\nEn breve te contactaremos para confirmar los detalles de tu pedido.\n\nCorreo: info@panambi-dulce.com');
            cart = [];
            updateCart();
            toggleCart();
        }

        // Inicializar
        renderProducts();
        updateCart();
    </script>
</body>
</html>
